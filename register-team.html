<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Team | CORE Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-50/50 text-slate-950 min-h-screen flex flex-col antialiased">

    <!-- Universal Navbar -->
    <header class="sticky top-0 z-50 w-full border-b border-gray-200 bg-white/95 backdrop-blur supports-[backdrop-filter]:bg-white/60">
        <div class="container mx-auto max-w-6xl flex h-14 items-center justify-between px-4 sm:px-6">
            <div class="flex items-center gap-2 font-semibold tracking-tight">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                CORE Portal
            </div>
            <nav class="flex items-center gap-6 text-sm font-medium text-slate-600">
                <a href="/" class="transition-colors hover:text-slate-950">Overview</a>
                <a href="/register-team.html" class="text-slate-950 transition-colors hover:text-slate-950">Students</a>
                <a href="/project-intake.html" class="transition-colors hover:text-slate-950">Proposals</a>
                <a href="/admin-dashboard.html" class="transition-colors hover:text-slate-950">Admin</a>
            </nav>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-grow flex items-center justify-center p-6 md:p-10">
        <div class="rounded-xl border border-gray-200 bg-white text-slate-950 shadow-sm w-full max-w-2xl">
            <div class="p-6">
                <div class="space-y-1 mb-6">
                    <h2 class="text-2xl font-semibold tracking-tight">Team Registration</h2>
                    <p class="text-sm text-slate-500">Register your 4-member team and select your project preferences.</p>
                </div>

                <form id="teamForm" class="space-y-6">
                    <!-- Roll Numbers -->
                    <div class="space-y-3">
                        <h3 class="text-sm font-semibold text-slate-900 border-b pb-2">Student Roll Numbers</h3>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <input type="text" id="member1" required placeholder="Member 1 (Your Roll No)" class="flex h-10 w-full rounded-md border border-gray-200 bg-white px-3 py-2 text-sm placeholder:text-slate-500 focus:outline-none focus:ring-2 focus:ring-slate-950 focus:ring-offset-2">
                            <input type="text" id="member2" required placeholder="Member 2 Roll No" class="flex h-10 w-full rounded-md border border-gray-200 bg-white px-3 py-2 text-sm placeholder:text-slate-500 focus:outline-none focus:ring-2 focus:ring-slate-950 focus:ring-offset-2">
                            <input type="text" id="member3" required placeholder="Member 3 Roll No" class="flex h-10 w-full rounded-md border border-gray-200 bg-white px-3 py-2 text-sm placeholder:text-slate-500 focus:outline-none focus:ring-2 focus:ring-slate-950 focus:ring-offset-2">
                            <input type="text" id="member4" required placeholder="Member 4 Roll No" class="flex h-10 w-full rounded-md border border-gray-200 bg-white px-3 py-2 text-sm placeholder:text-slate-500 focus:outline-none focus:ring-2 focus:ring-slate-950 focus:ring-offset-2">
                        </div>
                    </div>

                    <!-- Project Preferences -->
                    <div class="space-y-3">
                        <h3 class="text-sm font-semibold text-slate-900 border-b pb-2">Project Preferences</h3>
                        <div class="space-y-3">
                            <div>
                                <label class="block text-sm font-medium text-slate-950 mb-1">Preference 1 *</label>
                                <input type="text" id="pref1" required placeholder="e.g., CORE-1024" class="flex h-10 w-full rounded-md border border-gray-200 bg-white px-3 py-2 text-sm placeholder:text-slate-500 focus:outline-none focus:ring-2 focus:ring-slate-950 focus:ring-offset-2">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-slate-950 mb-1">Preference 2 *</label>
                                <input type="text" id="pref2" required placeholder="e.g., CORE-3045" class="flex h-10 w-full rounded-md border border-gray-200 bg-white px-3 py-2 text-sm placeholder:text-slate-500 focus:outline-none focus:ring-2 focus:ring-slate-950 focus:ring-offset-2">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-slate-950 mb-1">Preference 3 *</label>
                                <input type="text" id="pref3" required placeholder="e.g., CORE-8891" class="flex h-10 w-full rounded-md border border-gray-200 bg-white px-3 py-2 text-sm placeholder:text-slate-500 focus:outline-none focus:ring-2 focus:ring-slate-950 focus:ring-offset-2">
                            </div>
                        </div>
                    </div>

                    <button type="submit" class="inline-flex items-center justify-center rounded-md text-sm font-medium bg-slate-900 text-slate-50 hover:bg-slate-900/90 h-10 px-4 py-2 w-full transition-colors focus:outline-none focus:ring-2 focus:ring-slate-950 focus:ring-offset-2">
                        Finalize Registration
                    </button>
                </form>

                <div id="statusMessage" class="mt-4 p-3 rounded-md text-center text-sm font-medium hidden"></div>
            </div>
        </div>
    </main>

    <!-- Universal Footer -->
    <footer class="border-t border-gray-200 bg-white/50 py-6 mt-auto">
        <div class="container mx-auto max-w-6xl px-4 text-center text-sm text-slate-500">
            <p>An initiative by Academic Outreach and Community Connect</p>
            <p class="mt-1">&copy; 2026 by IIT Roorkee</p>
        </div>
    </footer>

    <script>
        document.getElementById('teamForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const status = document.getElementById('statusMessage');
            status.className = "mt-4 p-3 rounded-md text-center text-sm font-medium block bg-slate-100 text-slate-700 animate-pulse";
            status.innerText = "Verifying student records...";

            const payload = {
                members: [
                    document.getElementById('member1').value.trim(),
                    document.getElementById('member2').value.trim(),
                    document.getElementById('member3').value.trim(),
                    document.getElementById('member4').value.trim()
                ],
                preferences: [
                    document.getElementById('pref1').value.trim(),
                    document.getElementById('pref2').value.trim(),
                    document.getElementById('pref3').value.trim()
                ]
            };

            try {
                const response = await fetch('/api/register-team', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await response.json();
                
                if(response.ok) {
                    status.className = "mt-4 p-3 rounded-md text-center text-sm font-medium block border border-green-200 bg-green-50 text-green-900";
                    status.innerHTML = `Success! Team registered. Your ID is: <strong>${data.teamId}</strong>`;
                    document.getElementById('teamForm').reset();
                } else {
                    status.className = "mt-4 p-3 rounded-md text-center text-sm font-medium block border border-red-200 bg-red-50 text-red-900";
                    status.innerText = "Error: " + data.message;
                }
            } catch (err) {
                status.className = "mt-4 p-3 rounded-md text-center text-sm font-medium block border border-red-200 bg-red-50 text-red-900";
                status.innerText = "Connection failed. Please try again later.";
            }
        });
    </script>
</body>
</html>
