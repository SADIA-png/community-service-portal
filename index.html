<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Registration | Community Service Portal</title>
    <!-- Tailwind CSS CDN for styling without friction -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 font-sans min-h-screen flex items-center justify-center p-6">

    <div class="bg-white p-8 rounded-xl shadow-md w-full max-w-2xl">
        <h1 class="text-2xl font-bold text-gray-850 mb-2">Team Registration</h1>
        <p class="text-sm text-gray-600 mb-6">Form your interdisciplinary group of 4-5 graduate students. One student must register as the Team Lead.</p>

        <form id="registrationForm" class="space-y-6">
            <!-- Program / Department Select -->
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Academic Program/Department</label>
                <input type="text" id="program" required placeholder="e.g., MBA / MCA Interdisciplinary" class="w-full px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <hr class="border-gray-200">

            <!-- Team Members Inputs -->
            <div>
                <h3 class="text-sm font-semibold text-gray-700 mb-3">Team Members (Enter Roll Numbers/IDs)</h3>
                <div class="space-y-3">
                    <div>
                        <label class="block text-xs text-gray-500 mb-1">Team Lead ID</label>
                        <input type="text" id="leadId" required placeholder="e.g., STU001" class="w-full px-4 py-2 border border-blue-300 bg-blue-50 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div>
                        <label class="block text-xs text-gray-500 mb-1">Member 2 ID</label>
                        <input type="text" id="member2" required placeholder="e.g., STU002" class="w-full px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div>
                        <label class="block text-xs text-gray-500 mb-1">Member 3 ID</label>
                        <input type="text" id="member3" required placeholder="e.g., STU003" class="w-full px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div>
                        <label class="block text-xs text-gray-500 mb-1">Member 4 ID</label>
                        <input type="text" id="member4" required placeholder="e.g., STU004" class="w-full px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div>
                        <label class="block text-xs text-gray-500 mb-1">Member 5 ID (Optional)</label>
                        <input type="text" id="member5" placeholder="e.g., STU005" class="w-full px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                </div>
            </div>

            <hr class="border-gray-200">

            <!-- Project Preferences Selection -->
            <div>
                <h3 class="text-sm font-semibold text-gray-700 mb-2">Project Preferences</h3>
                <p class="text-xs text-gray-500 mb-4">Enter the Project IDs from the approved pool in order of priority.</p>
                <div class="grid grid-cols-3 gap-4">
                    <input type="text" id="pref1" required placeholder="1st Choice (ID)" class="w-full px-3 py-2 border border-green-300 rounded-md focus:outline-none focus:ring-2 focus:ring-green-500">
                    <input type="text" id="pref2" required placeholder="2nd Choice (ID)" class="w-full px-3 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <input type="text" id="pref3" required placeholder="3rd Choice (ID)" class="w-full px-3 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
            </div>

            <button type="submit" class="w-full bg-blue-600 text-white font-medium py-2 rounded-md hover:bg-blue-750 transition duration-200 shadow-sm">Submit Team Registration</button>
        </form>

        <!-- Status Message Div -->
        <div id="statusMessage" class="mt-4 p-3 rounded-md text-center hidden"></div>
    </div>

    <script>
        document.getElementById('registrationForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const status = document.getElementById('statusMessage');
            status.className = "mt-4 p-3 rounded-md text-center block bg-blue-100 text-blue-700";
            status.innerText = "Processing registration...";

            // Gather structural payload from inputs
            const members = [
                document.getElementById('leadId').value.trim(),
                document.getElementById('member2').value.trim(),
                document.getElementById('member3').value.trim(),
                document.getElementById('member4').value.trim()
            ];
            const m5 = document.getElementById('member5').value.trim();
            if(m5) members.push(m5);

            const payload = {
                program: document.getElementById('program').value.trim(),
                members: members,
                preferences: [
                    document.getElementById('pref1').value.trim(),
                    document.getElementById('pref2').value.trim(),
                    document.getElementById('pref3').value.trim()
                ]
            };

            try {
                // Post payload straight to our upcoming serverless API
                const response = await fetch('/api/register-team', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                const data = await response.json();
                
                if(response.ok) {
                    status.className = "mt-4 p-3 rounded-md text-center block bg-green-100 text-green-700";
                    status.innerText = "Success! Team registered successfully.";
                    document.getElementById('registrationForm').reset();
                } else {
                    status.className = "mt-4 p-3 rounded-md text-center block bg-red-100 text-red-700";
                    status.innerText = "Error: " + data.message;
                }
            } catch (err) {
                status.className = "mt-4 p-3 rounded-md text-center block bg-red-100 text-red-700";
                status.innerText = "Connection failed. Please try again later.";
            }
        });
    </script>
</body>
</html>
