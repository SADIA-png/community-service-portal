<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Report | CORE Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-50/50 text-slate-950 min-h-screen flex flex-col antialiased">

    <header class="sticky top-0 z-50 w-full border-b border-gray-200 bg-white/95 backdrop-blur supports-[backdrop-filter]:bg-white/60">
        <div class="container mx-auto max-w-6xl flex h-14 items-center justify-between px-4 sm:px-6">
            <div class="flex items-center gap-2 font-semibold tracking-tight">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                CORE Portal
            </div>
            <nav class="flex items-center gap-6 text-sm font-medium text-slate-600">
                <a href="/" class="transition-colors hover:text-slate-950">Overview</a>
                <a href="/register-team.html" class="transition-colors hover:text-slate-950">Students</a>
                <a href="/project-intake.html" class="transition-colors hover:text-slate-950">Proposals</a>
                <a href="/admin-dashboard.html" class="transition-colors hover:text-slate-950">Admin</a>
            </nav>
        </div>
    </header>

    <main class="flex-grow flex items-center justify-center p-6 md:p-10">
        <div class="rounded-xl border border-gray-200 bg-white text-slate-950 shadow-sm w-full max-w-md">
            <div class="p-6">
                <div class="space-y-1 mb-6">
                    <h2 class="text-2xl font-semibold tracking-tight">Upload Field Report</h2>
                    <p class="text-sm text-slate-500">Submit your final PDF or ZIP. Max file size: 4MB.</p>
                </div>

                <form id="uploadForm" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-950 mb-1">Team ID *</label>
                        <input type="text" id="teamId" required placeholder="e.g., TEAM-1234" class="flex h-10 w-full rounded-md border border-gray-200 bg-white px-3 py-2 text-sm placeholder:text-slate-500 focus:outline-none focus:ring-2 focus:ring-slate-950 focus:ring-offset-2">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-950 mb-1">Select File *</label>
                        <input type="file" id="reportFile" required accept=".pdf,image/*,.zip" class="flex h-10 w-full rounded-md border border-gray-200 bg-white px-3 py-2 text-sm text-slate-500 file:border-0 file:bg-transparent file:text-sm file:font-medium file:text-slate-900 focus:outline-none focus:ring-2 focus:ring-slate-950 focus:ring-offset-2">
                    </div>
                    <button type="submit" class="mt-2 inline-flex items-center justify-center rounded-md text-sm font-medium bg-slate-900 text-slate-50 hover:bg-slate-900/90 h-10 px-4 py-2 w-full transition-colors focus:outline-none focus:ring-2 focus:ring-slate-950 focus:ring-offset-2">
                        Upload to Cloud Storage
                    </button>
                </form>

                <div id="statusMessage" class="mt-4 p-4 rounded-md text-center text-sm font-medium hidden"></div>
            </div>
        </div>
    </main>

    <footer class="border-t border-gray-200 bg-white/50 py-6 mt-auto">
        <div class="container mx-auto max-w-6xl px-4 text-center text-sm text-slate-500">
            <p>An initiative by Academic Outreach and Community Connect</p>
            <p class="mt-1">&copy; 2026 by IIT Roorkee</p>
        </div>
    </footer>

    <script>
        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const status = document.getElementById('statusMessage');
            const fileInput = document.getElementById('reportFile');
            const teamId = document.getElementById('teamId').value.trim();

            if (fileInput.files.length === 0) return;
            const file = fileInput.files[0];
            
            if (file.size > 4 * 1024 * 1024) {
                status.className = "mt-4 p-3 rounded-md text-center text-sm font-medium block border border-red-200 bg-red-50 text-red-900";
                status.innerText = "File is too large. Keep under 4MB.";
                return;
            }

            status.className = "mt-4 p-3 rounded-md text-center text-sm font-medium block bg-slate-100 text-slate-700 animate-pulse";
            status.innerText = "Encoding and transmitting file...";

            const reader = new FileReader();
            reader.onload = async function(event) {
                const base64Data = event.target.result;
                try {
                    const response = await fetch('/api/submit-report', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            teamId: teamId,
                            fileName: file.name,
                            contentType: file.type,
                            fileData: base64Data
                        })
                    });
                    const data = await response.json();
                    if(response.ok) {
                        status.className = "mt-4 p-4 rounded-md text-center text-sm font-medium block border border-green-200 bg-green-50 text-green-900";
                        status.innerHTML = `Success!<br><br><a href="${data.url}" target="_blank" class="underline font-bold text-green-700 hover:text-green-900">View Uploaded Asset</a>`;
                        document.getElementById('uploadForm').reset();
                    } else {
                        status.className = "mt-4 p-3 rounded-md text-center text-sm font-medium block border border-red-200 bg-red-50 text-red-900";
                        status.innerText = "Error: " + data.message;
                    }
                } catch (err) {
                    status.className = "mt-4 p-3 rounded-md text-center text-sm font-medium block border border-red-200 bg-red-50 text-red-900";
                    status.innerText = "Transmission failed.";
                }
            };
            reader.readAsDataURL(file);
        });
    </script>
</body>
</html>
