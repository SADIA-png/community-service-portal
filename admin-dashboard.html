<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CORE Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans min-h-screen p-6">

    <div class="max-w-7xl mx-auto space-y-8">
        <!-- Header -->
        <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200 flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-bold text-gray-900">CORE (XXC-399) Command Center</h1>
                <p class="text-sm text-gray-500">Manage field projects, student teams, and digital assets.</p>
            </div>
            <button onclick="fetchDashboardData()" class="bg-indigo-50 text-indigo-700 px-4 py-2 rounded-md font-medium hover:bg-indigo-100 transition">
                Refresh Data
            </button>
        </div>

        <!-- Loading State -->
        <div id="loading" class="text-center py-10 text-gray-500 font-medium animate-pulse">
            Fetching records from database...
        </div>

        <!-- Projects Section -->
        <div id="projectsSection" class="hidden space-y-4">
            <h2 class="text-xl font-bold text-gray-800">Senate-Approved Projects</h2>
            <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-x-auto">
                <table class="w-full text-left text-sm whitespace-nowrap">
                    <thead class="bg-gray-50 text-gray-600">
                        <tr>
                            <th class="p-4 font-semibold">Project ID</th>
                            <th class="p-4 font-semibold">Title</th>
                            <th class="p-4 font-semibold">Submitter</th>
                            <th class="p-4 font-semibold">Location</th>
                            <th class="p-4 font-semibold">Status</th>
                        </tr>
                    </thead>
                    <tbody id="projectsTableBody" class="divide-y divide-gray-100">
                        <!-- Injected via JS -->
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Teams Section -->
        <div id="teamsSection" class="hidden space-y-4">
            <h2 class="text-xl font-bold text-gray-800">Registered Student Teams</h2>
            <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-x-auto">
                <table class="w-full text-left text-sm whitespace-nowrap">
                    <thead class="bg-gray-50 text-gray-600">
                        <tr>
                            <th class="p-4 font-semibold">Team ID</th>
                            <th class="p-4 font-semibold">Members (Roll Nos)</th>
                            <th class="p-4 font-semibold">Assigned Project</th>
                            <th class="p-4 font-semibold">Status</th>
                            <th class="p-4 font-semibold">Field Report</th>
                        </tr>
                    </thead>
                    <tbody id="teamsTableBody" class="divide-y divide-gray-100">
                        <!-- Injected via JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        async function fetchDashboardData() {
            const loading = document.getElementById('loading');
            const projectsSection = document.getElementById('projectsSection');
            const teamsSection = document.getElementById('teamsSection');
            const projectsBody = document.getElementById('projectsTableBody');
            const teamsBody = document.getElementById('teamsTableBody');

            loading.classList.remove('hidden');
            projectsSection.classList.add('hidden');
            teamsSection.classList.add('hidden');

            try {
                const response = await fetch('/api/admin-dashboard');
                const data = await response.json();

                // Render Projects
                projectsBody.innerHTML = data.projects.map(p => `
                    <tr class="hover:bg-gray-50">
                        <td class="p-4 font-mono font-medium text-indigo-600">${p._id}</td>
                        <td class="p-4 truncate max-w-xs" title="${p.details?.title || p.title || ''}">${p.details?.title || p.title || 'N/A'}</td>
                        <td class="p-4">${p.submitter?.name || p.organization || 'N/A'}</td>
                        <td class="p-4">${p.logistics?.target_location || 'N/A'}</td>
                        <td class="p-4"><span class="px-2 py-1 bg-green-100 text-green-700 rounded-full text-xs font-bold uppercase tracking-wider">${p.status || p.assignment_status || 'Open'}</span></td>
                    </tr>
                `).join('');

                // Render Teams
                teamsBody.innerHTML = data.teams.map(t => {
                    const reportButton = t.report_url 
                        ? `<a href="${t.report_url}" target="_blank" class="text-blue-600 hover:text-blue-800 font-medium underline">View Asset</a>`
                        : `<span class="text-gray-400 italic">Pending</span>`;
                        
                    return `
                    <tr class="hover:bg-gray-50">
                        <td class="p-4 font-mono font-medium text-indigo-600">${t._id}</td>
                        <td class="p-4">${t.members ? t.members.join(', ') : 'N/A'}</td>
                        <td class="p-4 text-gray-500">${t.project_preference_1 || 'Unassigned'}</td>
                        <td class="p-4">${t.status || 'Registered'}</td>
                        <td class="p-4">${reportButton}</td>
                    </tr>
                `}).join('');

                loading.classList.add('hidden');
                projectsSection.classList.remove('hidden');
                teamsSection.classList.remove('hidden');

            } catch (error) {
                loading.innerText = "Error loading data. Check console.";
                loading.classList.replace('text-gray-500', 'text-red-500');
            }
        }

        // Load data automatically when the page opens
        window.onload = fetchDashboardData;
    </script>
</body>
</html>
